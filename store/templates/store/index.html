{% extends 'base.html' %}
{% block contenu %}
{% for produit in Produits %}
    <a href="{{ produit.get_absolute_url }}" style="text-decoration: none">
        <h2>{{ produit.nom }}</h2>
        <img src="{{ produit.image.url }}" alt="{{ produit.nom }} " style = "max-width: 250px ; max-height: 250px ">
        <p>Voir les details</p>
    </a>
{% endfor %}

{% endblock %}
